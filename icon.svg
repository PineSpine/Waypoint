<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5cb1ff"/>
      <stop offset="1" stop-color="#0060df"/>
    </linearGradient>
    <linearGradient id="gloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".55"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#062b63" flood-opacity="0.45"/>
    </filter>
  </defs>
  <!-- Hintergrund (maskable-sicher: Motiv in der zentralen Zone) -->
  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect x="0" y="0" width="512" height="266" rx="112" fill="url(#gloss)"/>
  <!-- gestrichelte Route -->
  <path d="M128 372 C 196 372 214 250 256 250 C 300 250 322 150 384 150"
        fill="none" stroke="#ffffff" stroke-opacity=".9" stroke-width="16"
        stroke-linecap="round" stroke-dasharray="4 34"/>
  <!-- Start- und Endpunkt -->
  <circle cx="128" cy="372" r="20" fill="#ffffff"/>
  <circle cx="128" cy="372" r="9" fill="#0060df"/>
  <!-- Wegpunkt-Pin (Teardrop) -->
  <g filter="url(#soft)">
    <path d="M256 96 c-59 0 -106 47 -106 106 c0 74 106 178 106 178 s106 -104 106 -178 c0 -59 -47 -106 -106 -106 z"
          fill="#ffffff"/>
    <circle cx="256" cy="202" r="42" fill="#0a84ff"/>
  </g>
</svg>
